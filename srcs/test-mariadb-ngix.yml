services:
  mariadb:
    container_name: mariadb-test
    build: requirements/mariadb
    env_file:
      - .env
    volumes:
      - mariadb-test:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - docker-network
  
  nginx:
    container_name: nginx-test
    build: requirements/nginx
    env_file:
      - .env
    depends_on:
      - mariadb
    ports:
      - "443:443"
    networks:
      - docker-network

volumes:
  mariadb-test:

networks:
  docker-network:
    name: docker-network
    driver: bridge