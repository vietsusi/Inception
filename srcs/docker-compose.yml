services:
  mariadb:
    container_name: mariadb
    build: requirements/mariadb
    env_file:
      - .env
    volumes:
      - mariadb-test:/var/lib/mysql
    networks:
      - docker-network
  
  wordpress:
    container_name: wordpress
    build: requirements/wordpress
    env_file:
      - .env
    depends_on:
      - mariadb
    volumes:
      - wp-test:/var/www/html
    networks:
      - docker-network

  nginx:
    container_name: nginx
    build: requirements/nginx
    env_file:
      - .env
    depends_on:
      - wordpress
    ports:
      - "443:443"
    volumes:
      - wp-test:/var/www/html
    networks:
      - docker-network

volumes:
  mariadb-test:
  wp-test:

networks:
  docker-network:
    name: docker-network
    driver: bridge